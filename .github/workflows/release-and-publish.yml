name: Release and Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Create Tag & GitHub Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Run Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Set package version
        run: |
          cd typescript
          npm version ${{ needs.release.outputs.new_release_version }} --no-git-tag-version

      - name: Install dependencies
        run: |
          cd typescript
          npm ci

      - name: Run codegen
        run: |
          cd typescript
          npm run codegen

      - name: Build package
        run: |
          cd typescript
          npm run build

      - name: Publish to NPM
        run: |
          cd typescript
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pip:
    name: Publish to PyPI (pip)
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set package version
        run: |
          cd python
          python -c "
          import re
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'(?m)^version\s*=\s*\"[^\"]+\"', 'version = \"${{ needs.release.outputs.new_release_version }}\"', content)
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          "

      - name: Install build tools & generator
        run: |
          python -m pip install --upgrade pip
          pip install "ariadne-codegen[http]" pydantic httpx build

      - name: Run codegen
        run: |
          cd python
          ariadne-codegen

      - name: Build package
        run: |
          cd python
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
